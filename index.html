<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Joshua U. Dickson — SWE & Founder</title>
  <meta name="description" content="Joshua U. Dickson — software engineer, founder of Rexpond, building The Tech Mural. Code is art."/>

  <link rel="stylesheet" href="styles/tokens.css"/>
  <link rel="stylesheet" href="styles/glass.css"/>
  <link rel="stylesheet" href="styles/chrome.css"/>
  <link rel="stylesheet" href="styles/home.css"/>
  <link rel="stylesheet" href="styles/pages.css"/>

  <style>
    .page-fade {
      animation: pageIn 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    /* loading splash — hides as soon as React mounts */
    #boot {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: var(--bg); z-index: 999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #boot.is-done { opacity: 0; visibility: hidden; pointer-events: none; }
    .boot-mark {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.95), rgba(255,255,255,0.4) 22%, var(--accent) 65%, var(--aur-violet) 100%);
      box-shadow: 0 0 30px var(--accent);
      animation: bootPulse 1.4s ease-in-out infinite alternate;
    }
    @keyframes bootPulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }
    .boot-text { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-muted); }
  </style>
</head>
<body>
  <div id="boot"><div class="boot-mark"></div><div class="boot-text">loading studio…</div></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/i18n-theme.jsx"></script>
  <script type="text/babel" src="app/atoms.jsx"></script>
  <script type="text/babel" src="app/nav-footer.jsx"></script>
  <script type="text/babel" src="app/page-home.jsx"></script>
  <script type="text/babel" src="app/page-projects-blog.jsx"></script>
  <script type="text/babel" src="app/page-gallery-events.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>

  <script>
    // Hide boot once root has children
    const obs = new MutationObserver(() => {
      if (document.getElementById("root")?.children.length) {
        document.getElementById("boot")?.classList.add("is-done");
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById("root"), { childList: true });
    setTimeout(() => document.getElementById("boot")?.classList.add("is-done"), 6000);
  </script>
</body>
</html>
